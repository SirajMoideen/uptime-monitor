name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
            -u "${{ secrets.GHCR_USERNAME }}" \
            --password-stdin

      - name: Build Image
        run: |
          docker build \
          -t ghcr.io/${{ secrets.GHCR_USERNAME }}/uptime-monitor:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/uptime-monitor:${{ github.sha }}