<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-pa Uptime Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">🌐 my-pa Uptime Monitor</h2>
        
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form id="addForm" class="d-flex gap-2">
                    <input type="url" id="urlInput" class="form-control" placeholder="https://example.com" required>
                    <button type="submit" class="btn btn-primary">Add Monitor</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>URL</th>
                            <th>Status</th>
                            <th>Last Checked</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="urlList">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchUrls() {
            const res = await fetch('/api/urls');
            const data = await res.json();
            const tbody = document.getElementById('urlList');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="align-middle">${item.url}</td>
                    <td class="align-middle">
                        <span class="badge ${item.status === 'UP' ? 'bg-success' : item.status === 'DOWN' ? 'bg-danger' : 'bg-secondary'}">
                            ${item.status}
                        </span>
                    </td>
                    <td class="align-middle text-muted small">${item.last_checked}</td>
                    <td>
                        <button onclick="deleteUrl(${item.id})" class="btn btn-sm btn-outline-danger">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();
            const url = document.getElementById('urlInput').value;
            await fetch('/api/urls', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            document.getElementById('urlInput').value = '';
            fetchUrls();
        };

        async function deleteUrl(id) {
            await fetch(`/api/urls/${id}`, { method: 'DELETE' });
            fetchUrls();
        }

        // Fetch immediately, then poll every 10 seconds to update the UI
        fetchUrls();
        setInterval(fetchUrls, 10000);
    </script>
</body>
</html>
