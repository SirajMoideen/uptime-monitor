<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0a0c0f;
            --surface:   #111318;
            --surface2:  #181c22;
            --border:    #1f2530;
            --border2:   #2a3040;
            --text:      #e2e8f0;
            --muted:     #5a6478;
            --accent:    #00e5a0;
            --accent-dim:#00e5a020;
            --danger:    #ff4d6d;
            --danger-dim:#ff4d6d18;
            --warn:      #ffc145;
            --warn-dim:  #ffc14518;
            --pending:   #7b8cde;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo { display: flex; align-items: center; gap: 12px; }

        .logo-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 16px; font-weight: 700; letter-spacing: -0.5px;
        }
        .logo-text span { color: var(--accent); }

        .header-meta {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 11px; color: var(--muted);
        }

        .pulse-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:.4; transform:scale(.8); }
        }

        /* ── STATS ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
            transition: border-color .2s;
        }
        .stat-card:hover { border-color: var(--border2); }

        .stat-label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted); margin-bottom: 8px;
            font-family: 'Space Mono', monospace;
        }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 28px; font-weight: 700; line-height: 1;
        }
        .stat-value.up    { color: var(--accent); }
        .stat-value.down  { color: var(--danger); }
        .stat-value.total { color: var(--text); }

        /* ── ADD FORM ── */
        .add-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .add-card-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted); margin-bottom: 14px;
        }

        .add-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Type selector tabs */
        .type-tabs {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            flex-shrink: 0;
        }

        .type-tab {
            border: none;
            background: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s;
            white-space: nowrap;
        }

        .type-tab:hover { color: var(--text); }

        .type-tab.active {
            background: var(--border2);
            color: var(--accent);
        }

        /* Input group: host + optional port */
        .input-group {
            display: flex;
            flex: 1;
            min-width: 200px;
            gap: 0;
        }

        .scheme-prefix {
            display: flex;
            align-items: center;
            padding: 0 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-right: none;
            border-radius: 8px 0 0 8px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .host-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 11px 14px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            min-width: 0;
        }

        .host-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        /* no prefix = rounded left too */
        .host-input.no-prefix { border-radius: 8px 0 0 8px; }

        .port-input {
            width: 86px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: none;
            padding: 11px 12px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }

        .port-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        /* last visible input in the group gets rounded right */
        .input-group > *:last-child {
            border-radius: 0 8px 8px 0;
        }

        .port-hint {
            display: flex;
            align-items: center;
            padding: 0 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 8px 8px 0;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
        }

        .btn-add {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 11px 22px;
            color: #000;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity .15s, transform .1s;
            flex-shrink: 0;
            align-self: flex-start;
        }
        .btn-add:hover  { opacity: .88; }
        .btn-add:active { transform: scale(.97); }
        .btn-add:disabled { opacity: .5; cursor: not-allowed; }

        .add-hint {
            margin-top: 10px;
            font-size: 11px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }

        /* ── TABLE PANEL ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted);
        }

        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 4px 10px;
            color: var(--muted);
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: border-color .2s, color .2s;
        }
        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            padding: 10px 20px;
            text-align: left;
            font-family: 'Space Mono', monospace;
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted);
            background: var(--surface2);
            font-weight: 400;
        }

        tbody tr { border-top: 1px solid var(--border); transition: background .15s; }
        tbody tr:hover { background: var(--surface2); }

        td { padding: 13px 20px; vertical-align: middle; }

        .url-cell {
            font-family: 'Space Mono', monospace;
            font-size: 12px; color: var(--text);
            max-width: 300px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* check-type chip */
        .type-chip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .5px;
            text-transform: uppercase;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--muted);
        }
        .type-chip.http  { color: #60a5fa; border-color: #60a5fa30; background: #60a5fa10; }
        .type-chip.https { color: var(--accent); border-color: #00e5a030; background: var(--accent-dim); }
        .type-chip.ping  { color: #c084fc; border-color: #c084fc30; background: #c084fc10; }
        .type-chip.tcp   { color: var(--warn); border-color: #ffc14530; background: var(--warn-dim); }

        /* status badges */
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 3px 10px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 10px; font-weight: 700; letter-spacing: .5px;
            white-space: nowrap;
        }
        .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

        .badge.up      { background: var(--accent-dim);  color: var(--accent);  border: 1px solid #00e5a030; }
        .badge.down    { background: var(--danger-dim);  color: var(--danger);  border: 1px solid #ff4d6d30; }
        .badge.paused  { background: var(--warn-dim);    color: var(--warn);    border: 1px solid #ffc14530; }
        .badge.pending { background: #7b8cde18;          color: var(--pending); border: 1px solid #7b8cde30; }

        .badge.up      .badge-dot { background: var(--accent);  animation: pulse 2s ease-in-out infinite; }
        .badge.down    .badge-dot { background: var(--danger); }
        .badge.paused  .badge-dot { background: var(--warn); }
        .badge.pending .badge-dot { background: var(--pending); animation: pulse 1.5s ease-in-out infinite; }

        .time-cell {
            font-family: 'Space Mono', monospace;
            font-size: 11px; color: var(--muted); white-space: nowrap;
        }

        .actions { display: flex; gap: 6px; }

        .btn-action {
            border-radius: 6px;
            border: 1px solid var(--border);
            background: none;
            padding: 5px 12px;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s, border-color .15s, color .15s, transform .1s;
            white-space: nowrap;
            color: var(--muted);
        }
        .btn-action:active { transform: scale(.95); }

        .btn-pause:hover  { background: var(--warn-dim);   border-color: var(--warn);   color: var(--warn); }
        .btn-resume:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .btn-edit:hover   { background: var(--surface2);   border-color: var(--border2); color: var(--text); }
        .btn-delete:hover { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }

        .ssl-option {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            user-select: none;
        }
        .ssl-option input { accent-color: var(--accent); cursor: pointer; }

        .ssl-badge {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 6px;
            border-radius: 3px;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .3px;
            text-transform: uppercase;
            color: var(--warn);
            background: var(--warn-dim);
            border: 1px solid #ffc14530;
            vertical-align: middle;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #00000088;
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            width: 100%;
            max-width: 560px;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
        }
        .modal-close:hover { color: var(--text); }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-cancel {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 18px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-cancel:hover { border-color: var(--border2); color: var(--text); }

        .btn-save {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            color: #000;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-save:hover { opacity: .88; }
        .btn-save:disabled { opacity: .5; cursor: not-allowed; }

        /* ── EMPTY STATE ── */
        .empty-state { padding: 64px 20px; text-align: center; }
        .empty-icon  { font-size: 32px; margin-bottom: 12px; opacity: .3; }
        .empty-title { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
        .empty-sub   { font-size: 12px; color: var(--muted); opacity: .6; }

        /* ── TOAST ── */
        .toast-container {
            position: fixed; bottom: 24px; right: 24px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 100;
        }
        .toast {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            font-family: 'Space Mono', monospace;
            color: var(--text);
            animation: slide-in .25s ease;
        }
        .toast.error   { border-color: var(--danger); color: var(--danger); }
        .toast.success { border-color: var(--accent); color: var(--accent); }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .stat-value { font-size: 22px; }
            .add-row { flex-direction: column; }
            thead th:nth-child(3), td:nth-child(3),
            thead th:nth-child(4), td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- Header -->
    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <circle cx="9" cy="9" r="3" fill="#000"/>
                    <path d="M9 2a7 7 0 1 1 0 14A7 7 0 0 1 9 2" stroke="#000" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
                </svg>
            </div>
            <div class="logo-text">uptime<span>.</span>monitor</div>
        </div>
        <div class="header-meta">
            <div class="pulse-dot"></div>
            <span id="lastRefreshLabel">checking...</span>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value total" id="statTotal">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Online</div>
            <div class="stat-value up" id="statUp">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Down</div>
            <div class="stat-value down" id="statDown">—</div>
        </div>
    </div>

    <!-- Add form -->
    <div class="add-card">
        <div class="add-card-title">Add Monitor</div>
        <form id="addForm">
            <div class="add-row">

                <!-- Protocol selector -->
                <div class="type-tabs" id="typeTabs">
                    <button type="button" class="type-tab active" data-type="https">HTTPS</button>
                    <button type="button" class="type-tab"        data-type="http">HTTP</button>
                    <button type="button" class="type-tab"        data-type="ping">PING</button>
                    <button type="button" class="type-tab"        data-type="tcp">TCP</button>
                </div>

                <!-- Dynamic input group -->
                <div class="input-group" id="inputGroup">
                    <span class="scheme-prefix" id="schemePrefix">https://</span>
                    <input class="host-input" id="hostInput" type="text"
                           placeholder="192.168.0.100 or example.com" autocomplete="off" required>
                    <input class="port-input" id="portInput" type="number"
                           placeholder="port" min="1" max="65535">
                </div>

                <button class="btn-add" type="submit" id="addBtn">+ Add Monitor</button>
            </div>
            <label class="ssl-option" id="sslOption" style="display:none">
                <input type="checkbox" id="ignoreSslInput">
                Ignore SSL certificate errors (self-signed / invalid certs)
            </label>
            <div class="add-hint" id="addHint">https://host[:port]</div>
        </form>
    </div>

    <!-- Edit modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Edit Monitor</span>
                <button type="button" class="modal-close" id="editModalClose" aria-label="Close">&times;</button>
            </div>
            <form id="editForm">
                <div class="add-row">
                    <div class="type-tabs" id="editTypeTabs">
                        <button type="button" class="type-tab" data-type="https">HTTPS</button>
                        <button type="button" class="type-tab" data-type="http">HTTP</button>
                        <button type="button" class="type-tab" data-type="ping">PING</button>
                        <button type="button" class="type-tab" data-type="tcp">TCP</button>
                    </div>
                    <div class="input-group" id="editInputGroup">
                        <span class="scheme-prefix" id="editSchemePrefix">https://</span>
                        <input class="host-input" id="editHostInput" type="text" autocomplete="off" required>
                        <input class="port-input" id="editPortInput" type="number" placeholder="port" min="1" max="65535">
                    </div>
                </div>
                <label class="ssl-option" id="editSslOption" style="display:none">
                    <input type="checkbox" id="editIgnoreSslInput">
                    Ignore SSL certificate errors (self-signed / invalid certs)
                </label>
                <div class="add-hint" id="editHint"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="editCancelBtn">Cancel</button>
                    <button type="submit" class="btn-save" id="editSaveBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Monitors</span>
            <button class="refresh-btn" onclick="fetchUrls()">↻ Refresh</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Endpoint</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Last Check</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="urlList"></tbody>
        </table>
    </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    let urlData       = [];
    let activeType    = 'https';
    let editActiveType = 'https';
    let editingId     = null;

    // ── Type tab logic ─────────────────────────────────────────────────────

    const HINTS = {
        https: 'https://host[:port] — enable "Ignore SSL" for self-signed certificates',
        http:  'http://host[:port]',
        ping:  'Enter a hostname or IP address — ICMP ping (no port needed)',
        tcp:   'Enter host and port — raw TCP socket check (e.g. for databases, MQTT, custom services)',
    };

    const PLACEHOLDERS = {
        https: '192.168.0.100 or example.com',
        http:  '192.168.0.100 or example.com',
        ping:  '192.168.0.100 or hostname',
        tcp:   '192.168.0.100 or hostname',
    };

    document.getElementById('typeTabs').addEventListener('click', e => {
        const tab = e.target.closest('.type-tab');
        if (!tab || !tab.closest('#typeTabs')) return;
        activeType = tab.dataset.type;
        document.querySelectorAll('#typeTabs .type-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        updateInputGroup('add', activeType);
    });

    document.getElementById('editTypeTabs').addEventListener('click', e => {
        const tab = e.target.closest('.type-tab');
        if (!tab || !tab.closest('#editTypeTabs')) return;
        editActiveType = tab.dataset.type;
        document.querySelectorAll('#editTypeTabs .type-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        updateInputGroup('edit', editActiveType);
    });

    function updateInputGroup(mode, type) {
        const isEdit   = mode === 'edit';
        const prefix   = document.getElementById(isEdit ? 'editSchemePrefix' : 'schemePrefix');
        const host     = document.getElementById(isEdit ? 'editHostInput' : 'hostInput');
        const port     = document.getElementById(isEdit ? 'editPortInput' : 'portInput');
        const hint     = document.getElementById(isEdit ? 'editHint' : 'addHint');
        const sslOpt   = document.getElementById(isEdit ? 'editSslOption' : 'sslOption');

        host.placeholder = PLACEHOLDERS[type];
        hint.textContent = HINTS[type];
        sslOpt.style.display = type === 'https' ? 'flex' : 'none';

        if (type === 'https' || type === 'http') {
            prefix.style.display = '';
            prefix.textContent   = type + '://';
            host.classList.remove('no-prefix');
            host.style.borderRadius = '';
            port.style.display   = '';
        } else if (type === 'ping') {
            prefix.style.display = 'none';
            host.classList.add('no-prefix');
            port.style.display   = 'none';
            host.style.borderRadius = '0 8px 8px 0';
        } else {
            prefix.style.display = 'none';
            host.classList.add('no-prefix');
            host.style.borderRadius = '';
            port.style.display   = '';
        }
    }

    function buildMonitorUrl(type, host, port) {
        if (type === 'ping') return host;
        if (type === 'tcp') return `${host}:${port}`;
        return port ? `${host}:${port}` : host;
    }

    function parseMonitorForForm(item) {
        const type = (item.check_type || 'http').toLowerCase();
        let host = item.url, port = '';

        if (type === 'ping') {
            host = item.url.replace(/^https?:\/\//, '').split('/')[0].split(':')[0];
        } else if (type === 'tcp') {
            const part = item.url.replace(/^https?:\/\//, '').split('/')[0];
            const idx = part.lastIndexOf(':');
            if (idx !== -1) {
                host = part.slice(0, idx);
                port = part.slice(idx + 1);
            }
        } else {
            const m = item.url.match(/^https?:\/\/([^/]+)/);
            if (m) {
                const hostPort = m[1];
                const idx = hostPort.lastIndexOf(':');
                if (idx !== -1) {
                    host = hostPort.slice(0, idx);
                    port = hostPort.slice(idx + 1);
                } else {
                    host = hostPort;
                }
            }
        }

        return { type, host, port, ignore_ssl: !!item.ignore_ssl };
    }

    // ── Fetch & render ─────────────────────────────────────────────────────

    function showToast(msg, type = '') {
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = msg;
        document.getElementById('toastContainer').appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    function badgeHTML(item) {
        if (item.paused) return `<span class="badge paused"><span class="badge-dot"></span>PAUSED</span>`;
        const map = { UP:'up', DOWN:'down', PENDING:'pending' };
        const cls = map[item.status] || 'pending';
        return `<span class="badge ${cls}"><span class="badge-dot"></span>${item.status || 'PENDING'}</span>`;
    }

    function typeChip(ct) {
        const t = (ct || 'http').toLowerCase();
        return `<span class="type-chip ${t}">${t.toUpperCase()}</span>`;
    }

    async function fetchUrls() {
        try {
            const res = await fetch('/api/urls');
            urlData = await res.json();
            renderTable();
            updateStats();
            const now = new Date();
            document.getElementById('lastRefreshLabel').textContent =
                'updated ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        } catch { showToast('Failed to fetch data', 'error'); }
    }

    function renderTable() {
        const tbody = document.getElementById('urlList');
        if (!urlData.length) {
            tbody.innerHTML = `<tr><td colspan="5">
                <div class="empty-state">
                    <div class="empty-icon">◉</div>
                    <div class="empty-title">No monitors yet</div>
                    <div class="empty-sub">Add a URL, IP, or hostname above</div>
                </div></td></tr>`;
            return;
        }
        tbody.innerHTML = urlData.map(item => `
            <tr>
                <td class="url-cell" title="${item.url}">
                    ${item.url}${item.ignore_ssl ? '<span class="ssl-badge">no ssl</span>' : ''}
                </td>
                <td>${typeChip(item.check_type)}</td>
                <td>${badgeHTML(item)}</td>
                <td class="time-cell">${item.paused ? '—' : (item.last_checked || '—')}</td>
                <td>
                    <div class="actions">
                        <button class="btn-action btn-edit" onclick="openEditModal(${item.id})">Edit</button>
                        <button class="btn-action ${item.paused ? 'btn-resume' : 'btn-pause'}"
                            onclick="togglePause(${item.id}, ${!item.paused})">
                            ${item.paused ? 'Resume' : 'Pause'}
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteUrl(${item.id})">Delete</button>
                    </div>
                </td>
            </tr>`).join('');
    }

    function updateStats() {
        const active = urlData.filter(u => !u.paused);
        document.getElementById('statTotal').textContent = urlData.length;
        document.getElementById('statUp').textContent    = active.filter(u => u.status === 'UP').length;
        document.getElementById('statDown').textContent  = active.filter(u => u.status === 'DOWN').length;
    }

    // ── Form submit ────────────────────────────────────────────────────────

    document.getElementById('addForm').onsubmit = async e => {
        e.preventDefault();
        const host = document.getElementById('hostInput').value.trim();
        const port = document.getElementById('portInput').value.trim();
        const btn  = document.getElementById('addBtn');

        if (!host) { showToast('Host is required', 'error'); return; }

        if (activeType === 'tcp' && !port) {
            showToast('Port is required for TCP checks', 'error');
            return;
        }

        const url = buildMonitorUrl(activeType, host, port);
        const ignore_ssl = activeType === 'https' && document.getElementById('ignoreSslInput').checked;

        btn.disabled = true;
        try {
            const res = await fetch('/api/urls', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, check_type: activeType, ignore_ssl })
            });
            const data = await res.json();
            if (!res.ok) { showToast(data.error || 'Error adding monitor', 'error'); }
            else {
                showToast('Monitor added', 'success');
                document.getElementById('hostInput').value = '';
                document.getElementById('portInput').value = '';
                document.getElementById('ignoreSslInput').checked = false;
                fetchUrls();
            }
        } catch { showToast('Network error', 'error'); }
        btn.disabled = false;
    };

    // ── Edit modal ─────────────────────────────────────────────────────────

    function openEditModal(id) {
        const item = urlData.find(u => u.id === id);
        if (!item) return;

        editingId = id;
        const parsed = parseMonitorForForm(item);
        editActiveType = parsed.type;

        document.querySelectorAll('#editTypeTabs .type-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.type === parsed.type);
        });
        document.getElementById('editHostInput').value = parsed.host;
        document.getElementById('editPortInput').value = parsed.port;
        document.getElementById('editIgnoreSslInput').checked = parsed.ignore_ssl;
        updateInputGroup('edit', editActiveType);
        document.getElementById('editModal').classList.add('open');
    }

    function closeEditModal() {
        editingId = null;
        document.getElementById('editModal').classList.remove('open');
    }

    document.getElementById('editModalClose').onclick = closeEditModal;
    document.getElementById('editCancelBtn').onclick = closeEditModal;
    document.getElementById('editModal').onclick = e => {
        if (e.target.id === 'editModal') closeEditModal();
    };

    document.getElementById('editForm').onsubmit = async e => {
        e.preventDefault();
        if (!editingId) return;

        const host = document.getElementById('editHostInput').value.trim();
        const port = document.getElementById('editPortInput').value.trim();
        const btn  = document.getElementById('editSaveBtn');

        if (!host) { showToast('Host is required', 'error'); return; }
        if (editActiveType === 'tcp' && !port) {
            showToast('Port is required for TCP checks', 'error');
            return;
        }

        const url = buildMonitorUrl(editActiveType, host, port);
        const ignore_ssl = editActiveType === 'https' && document.getElementById('editIgnoreSslInput').checked;

        btn.disabled = true;
        try {
            const res = await fetch(`/api/urls/${editingId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, check_type: editActiveType, ignore_ssl })
            });
            const data = await res.json();
            if (!res.ok) { showToast(data.error || 'Error updating monitor', 'error'); }
            else {
                showToast('Monitor updated', 'success');
                closeEditModal();
                fetchUrls();
            }
        } catch { showToast('Network error', 'error'); }
        btn.disabled = false;
    };

    // ── Actions ────────────────────────────────────────────────────────────

    async function deleteUrl(id) {
        await fetch(`/api/urls/${id}`, { method: 'DELETE' });
        showToast('Monitor removed');
        fetchUrls();
    }

    async function togglePause(id, paused) {
        await fetch(`/api/urls/${id}/pause`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({paused})
        });
        showToast(paused ? 'Monitor paused' : 'Monitor resumed');
        fetchUrls();
    }

    // Init
    updateInputGroup('add', activeType);
    fetchUrls();
    setInterval(fetchUrls, 10000);
</script>
</body>
</html>
